<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viralliset kennelliittokuvaukset — rotu &amp; ikä -työkalu | Eläinklinikka Saari</title>
<meta name="description" content="Klinikan sisäinen kuvausopas eläinlääkärille: rotu + ikä → vaadittavat viralliset röntgenkuvaukset, ikärajat, kuvausasennot, pakolliset merkinnät ja hylkäyssyyt. FI/EN.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://saarivet.fi/kennelkuvat/">
<link rel="icon" href="/favicon.ico">
<meta property="og:title" content="Viralliset kennelliittokuvaukset — rotu & ikä -työkalu">
<meta property="og:description" content="Mitkä viralliset röntgenkuvat koirasi tarvitsee jalostusta varten? Rotu + syntymäaika = kuvauslista, ikärajat ja asento-ohjeet.">
<meta property="og:url" content="https://saarivet.fi/kennelkuvat/">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c11; --panel:#0e141c; --panel2:#121a24; --line:#22303e; --line2:#2f4254;
  --ink:#dbe7f0; --ink-dim:#8ba3b5; --ink-faint:#5d7386;
  --glow:#8fe3ff; --glow-dim:#4db8d8; --accent:#ffc46b; --ok:#7fe0a8; --warn:#ffb35c;
  --film:#0a1018; --bone:#bfe9f7;
  --radius:14px;
  --sans:"IBM Plex Sans",sans-serif; --mono:"IBM Plex Mono",monospace; --disp:"Bricolage Grotesque",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;
  background-image:radial-gradient(1200px 600px at 70% -10%, rgba(77,184,216,.08), transparent 60%),
                   radial-gradient(800px 500px at -10% 30%, rgba(255,196,107,.04), transparent 55%);}
a{color:var(--glow)}
.wrap{max-width:1060px;margin:0 auto;padding:0 20px}

/* ── header ── */
header.site{padding:26px 0 0}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:.85rem}
.topbar a{color:var(--ink-dim);text-decoration:none;letter-spacing:.04em}
.topbar a:hover{color:var(--glow)}
.topbar .right{display:flex;align-items:center;gap:16px}
.topbar .clinic{font-family:var(--mono);font-size:.78rem;color:var(--ink-faint)}
.langtoggle{display:inline-flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden;font-family:var(--mono);font-size:.72rem}
.langtoggle button{background:none;border:0;color:var(--ink-faint);padding:5px 11px;cursor:pointer;letter-spacing:.1em;font:inherit;transition:background .15s,color .15s}
.langtoggle button.on{background:var(--glow);color:#04222e}
.langtoggle button:not(.on):hover{color:var(--glow)}
.hero{padding:44px 0 8px;position:relative}
.hero .kicker{font-family:var(--mono);color:var(--glow-dim);font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
.hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(2rem,5.4vw,3.4rem);line-height:1.04;letter-spacing:-.01em;max-width:16em}
.hero h1 .x{color:var(--glow);text-shadow:0 0 26px rgba(143,227,255,.45)}
.hero p.lead{margin-top:18px;max-width:44em;color:var(--ink-dim);font-size:1.02rem}
.hero p.lead b{color:var(--ink)}

/* ── console/form ── */
.console{margin:34px 0 10px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--radius);padding:22px;display:grid;grid-template-columns:1.5fr 1fr auto;gap:16px;align-items:end;
  box-shadow:0 20px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04)}
.field label{display:block;font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
.field input{width:100%;background:var(--film);border:1px solid var(--line2);border-radius:9px;color:var(--ink);
  font-family:var(--sans);font-size:1.02rem;padding:12px 14px;outline:none;transition:border-color .15s, box-shadow .15s}
.field input:focus{border-color:var(--glow-dim);box-shadow:0 0 0 3px rgba(77,184,216,.15)}
.field input::placeholder{color:var(--ink-faint)}
input[type=date]{color-scheme:dark}
.breedbox{position:relative}
.suggest{position:absolute;z-index:30;top:calc(100% + 6px);left:0;right:0;background:var(--panel2);border:1px solid var(--line2);
  border-radius:10px;max-height:290px;overflow:auto;display:none;box-shadow:0 18px 40px rgba(0,0,0,.6)}
.suggest.open{display:block}
.suggest button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--ink);padding:10px 14px;font:inherit;font-size:.95rem;cursor:pointer}
.suggest button .np{color:var(--ink-faint);font-size:.78rem;font-family:var(--mono)}
.suggest button:hover,.suggest button.active{background:rgba(77,184,216,.12)}
.btn{appearance:none;border:0;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:1rem;border-radius:10px;padding:13px 22px;transition:transform .12s, box-shadow .12s}
.btn.primary{background:var(--glow);color:#04222e;box-shadow:0 6px 22px rgba(143,227,255,.28)}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(143,227,255,.38)}
.btn.ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line2)}
.btn.ghost:hover{color:var(--glow);border-color:var(--glow-dim)}
.hint{font-size:.82rem;color:var(--ink-faint);margin:10px 4px 0;font-family:var(--mono)}

/* ── result header ── */
#result{display:none;margin-top:26px}
.rhead{display:flex;flex-wrap:wrap;align-items:baseline;gap:14px;justify-content:space-between;border-bottom:1px dashed var(--line2);padding-bottom:16px;margin-bottom:8px}
.rhead h2{font-family:var(--disp);font-size:clamp(1.5rem,3.4vw,2.2rem);font-weight:700}
.rhead .meta{font-family:var(--mono);color:var(--ink-dim);font-size:.85rem}
.actions{display:flex;gap:10px}
.summary{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 8px}
.chip{font-family:var(--mono);font-size:.8rem;border:1px solid var(--line2);border-radius:999px;padding:6px 14px;color:var(--ink-dim);background:rgba(255,255,255,.02)}
.chip.req{border-color:rgba(143,227,255,.4);color:var(--glow)}
.banner{margin:14px 0;padding:14px 18px;border-radius:10px;font-size:.95rem;border:1px solid var(--line2);background:var(--panel)}
.banner.info{border-color:rgba(143,227,255,.3)}
.banner.none{border-color:rgba(127,224,168,.35)}

/* ── study cards (film) ── */
.films{display:grid;gap:22px;margin:22px 0}
.film{background:linear-gradient(180deg,#0d141d,#0a1017);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.5)}
.film .tab{display:flex;align-items:center;gap:14px;padding:15px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
.film .tab .code{font-family:var(--mono);font-size:.72rem;letter-spacing:.2em;color:var(--glow-dim);border:1px solid var(--line2);border-radius:6px;padding:4px 9px}
.film .tab h3{font-family:var(--disp);font-weight:700;font-size:1.3rem;flex:1}
.status{font-family:var(--mono);font-size:.78rem;padding:6px 12px;border-radius:999px;white-space:nowrap}
.status.ok{color:#0a2b18;background:var(--ok)}
.status.wait{color:#3a2404;background:var(--warn)}
.status.na{color:var(--ink-dim);border:1px solid var(--line2)}
.film .body{display:grid;grid-template-columns:300px 1fr;gap:0}
.viewport{background:
   radial-gradient(340px 300px at 50% 42%, rgba(77,184,216,.08), transparent 70%),
   #05080c;
  border-right:1px solid var(--line);padding:16px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.viewport .xr{width:100%;max-width:272px;border-radius:6px;overflow:hidden;position:relative;
  box-shadow:0 6px 22px rgba(0,0,0,.6), inset 0 0 0 1px rgba(143,227,255,.12);background:#000}
.viewport .xr img{display:block;width:100%;height:auto;filter:contrast(1.06) brightness(1.02)}
.viewport .xr::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg, rgba(255,255,255,.06) 0%, transparent 22%, transparent 78%, rgba(143,227,255,.05) 100%)}
.viewport .cap{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);text-align:center}
.viewport .real{font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;color:var(--glow-dim);opacity:.85}
.film .info{padding:20px 24px 24px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 22px;margin-bottom:16px}
.kv{border-left:2px solid var(--line2);padding-left:12px}
.kv .k{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
.kv .v{font-size:.98rem;margin-top:2px}
.kv .v.mono{font-family:var(--mono);font-size:.9rem}
.film h4{font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--glow-dim);margin:16px 0 8px}
.film h4.warn{color:var(--warn)}
.film h4.marks{color:var(--accent)}
.film ul{list-style:none}
.film ul li{padding:4px 0 4px 22px;position:relative;color:var(--ink-dim);font-size:.94rem}
.film ul li::before{content:"";position:absolute;left:2px;top:.85em;width:10px;height:1px;background:var(--glow-dim)}
.film ul li b{color:var(--ink)}
.film ul li i{color:var(--ink-faint);font-style:italic}
.film ul.marks li::before{content:"✓";background:none;width:auto;top:.15em;color:var(--accent);font-family:var(--mono);font-size:.8rem}
.film ul.reject li::before{content:"✕";background:none;width:auto;top:.15em;color:var(--warn);font-family:var(--mono);font-size:.8rem}
.mono-inline{font-family:var(--mono);font-size:.86rem}
details.scale{margin-top:14px;border:1px solid var(--line);border-radius:9px;overflow:hidden}
details.scale summary{cursor:pointer;font-family:var(--mono);font-size:.78rem;letter-spacing:.1em;padding:10px 14px;color:var(--ink-dim);background:rgba(255,255,255,.02)}
details.scale summary:hover{color:var(--glow)}
details.scale .sc{padding:10px 16px 14px;font-size:.88rem}
details.scale table{width:100%;border-collapse:collapse}
details.scale td{padding:5px 10px 5px 0;vertical-align:top;color:var(--ink-dim);border-bottom:1px solid var(--line)}
details.scale td:first-child{font-family:var(--mono);color:var(--glow);white-space:nowrap;width:5em}
details.scale tr:last-child td{border-bottom:0}

/* ── extras / checklist ── */
.extras{margin:8px 0 26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px}
.extras h3{font-family:var(--disp);font-size:1.15rem;margin-bottom:10px}
.extras ul{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:4px 26px}
.extras li{padding:5px 0 5px 22px;position:relative;color:var(--ink-dim);font-size:.93rem}
.extras li::before{content:"+";position:absolute;left:2px;color:var(--accent);font-family:var(--mono)}
.extras li b{color:var(--ink)}
.checklist{margin:26px 0;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:26px 28px}
.checklist h3{font-family:var(--disp);font-size:1.45rem;margin-bottom:4px}
.checklist .sub{font-family:var(--mono);font-size:.78rem;color:var(--ink-faint);margin-bottom:16px;letter-spacing:.08em}
.checklist ol{list-style:none;counter-reset:c;columns:2;column-gap:44px}
.checklist ol li{counter-increment:c;padding:8px 0 8px 40px;position:relative;color:var(--ink-dim);font-size:.94rem;break-inside:avoid}
.checklist ol li::before{content:counter(c,decimal-leading-zero);position:absolute;left:0;top:9px;font-family:var(--mono);font-size:.78rem;color:var(--glow);border:1px solid var(--line2);border-radius:6px;padding:2px 6px}
.checklist ol li b{color:var(--ink)}
.limits{margin-top:16px;font-size:.85rem;color:var(--ink-faint);border-top:1px dashed var(--line2);padding-top:12px}

/* ── booking / footer ── */
.book{margin:34px 0;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;background:
  radial-gradient(600px 220px at 15% 0%, rgba(143,227,255,.1), transparent 60%),var(--panel2);
  border:1px solid rgba(143,227,255,.25);border-radius:var(--radius);padding:26px 30px}
.book h3{font-family:var(--disp);font-size:1.5rem}
.book p{color:var(--ink-dim);margin-top:6px;max-width:38em}
.book .tel{font-family:var(--mono);font-size:1.25rem;color:var(--glow);text-decoration:none;white-space:nowrap}
.book .tel:hover{text-shadow:0 0 18px rgba(143,227,255,.6)}
footer.site{margin:44px 0 36px;border-top:1px solid var(--line);padding-top:22px;font-size:.83rem;color:var(--ink-faint)}
footer.site .src{font-family:var(--mono);font-size:.75rem;line-height:1.8}
footer.site a{color:var(--ink-dim)}
footer.site .disc{margin-top:14px;max-width:60em}

@media(max-width:860px){
  .console{grid-template-columns:1fr}
  .film .body{grid-template-columns:1fr}
  .viewport{border-right:0;border-bottom:1px solid var(--line);padding:24px}
  .checklist ol{columns:1}
  .book{grid-template-columns:1fr}
}

/* ── PRINT: white paper document ── */
@media print{
  :root{--film:#fff;--bone:#1a2c38}
  body{background:#fff !important;color:#111;font-size:11.5pt}
  .topbar,.hero p.lead,.console,.hint,.actions,.book,.suggest{display:none !important}
  .hero{padding:0}
  .hero .kicker{color:#555}
  .hero h1{font-size:20pt;color:#000}
  .hero h1 .x{color:#000;text-shadow:none}
  #result{display:block !important;margin-top:8pt}
  .rhead{border-color:#999}
  .rhead h2{color:#000}
  .rhead .meta,.chip{color:#333;border-color:#aaa}
  .chip.req{color:#000;border-color:#000}
  .banner{border-color:#999;background:#fff;color:#222}
  .film{background:#fff;border:1.2pt solid #333;box-shadow:none;break-inside:avoid;margin-bottom:10pt}
  .film .tab{background:#fff;border-color:#333}
  .film .tab h3{color:#000}
  .film .tab .code{color:#333;border-color:#666}
  .status.ok{background:#fff;color:#000;border:1pt solid #000}
  .status.wait{background:#fff;color:#000;border:1pt dashed #000}
  .viewport{background:#111;border-color:#ccc}
  .viewport .cap{color:#444}
  .viewport .real{color:#666}
  .viewport .xr{box-shadow:none}
  .viewport .xr img{filter:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .viewport .xr::after{display:none}
  .film .info{color:#222}
  .kv .k,.film h4{color:#555}
  .kv .v,.film ul li,.film ul li b{color:#111}
  .film ul li::before{background:#555}
  .film h4.warn,.film h4.marks{color:#555}
  .film ul.marks li::before{content:"✓";background:none;color:#000}
  .film ul.reject li::before{content:"✕";background:none;color:#000}
  details.scale{display:none}
  .langtoggle{display:none}
  .extras,.checklist{background:#fff;border:1pt solid #333;color:#111;break-inside:avoid}
  .extras li,.checklist ol li{color:#222}
  .extras li b,.checklist ol li b{color:#000}
  .checklist ol li::before{color:#000;border-color:#666}
  .limits{color:#444;border-color:#999}
  footer.site{color:#444;border-color:#999}
  footer.site a{color:#444;text-decoration:none}
  a[href]::after{content:""}
}
</style>
</head>

  </div>
  <p class="disc" id="t-disc"></p>
</footer>

   "<b>Check the valid imaging referral</b> — the owner orders and pays for the statement in advance via Kennelliitto's Omakoira service",

function uu(k){return U[k]?U[k][lang]:k}

/* ══════════ study card templates ══════════

function xr(src,alt){return `<div class="xr"><img src="img/${src}" alt="${alt}" loading="lazy" width="1080" height="800"></div>`}

elbow:{code:"ED",title:"Kyynärnivelkuvaus",cap:"ML-kuva · ~45° koukistus · molemmat nivelet",svg:xr("elbow.jpg","Koiran kyynärnivelen virallinen ML-röntgenkuva noin 45 asteen koukistuksessa"),

 {name:"LTV — välimuotoinen lanne-ristinikama (alaikäraja 12 kk)",rows:[["LTV0","Ei muutoksia"],["LTV1","Jakautunut ristiluun keskiharjanne (S1–S2) tai muu lievä poikkeama"],["LTV2","Symmetrinen välimuotoinen lanne-ristinikama"],["LTV3","Epäsymmetrinen lanne-ristinikama"],["LTV4","6 tai 8 lannenikamaa"]]},

 {name:"SP — spondyloosi (alaikäraja 24 kk)",rows:[["SP0","Ei muutoksia"],["SP1","Lievä: pieniä piikkejä enintään 4 nikamavälissä"],["SP2","Selkeä: silloittuma tai suuria saarekkeita enintään 2 nikamavälissä"],["SP3","Keskivaikea: silloittumia/suuria saarekkeita 3–7 nikamavälissä"],["SP4","Vaikea: edellisiä vakavammat muutokset"]]},
 {name:"IDD — kalkkeutuneet välilevyt (alaikäraja 24 kk, vain Lista 1:n rodut)",rows:[["IDD0","Ei muutoksia"],["IDD1","1–2 kalkkeutunutta välilevyä"],["IDD2","3–4 kalkkeutunutta välilevyä"],["IDD3","≥ 5 kalkkeutunutta välilevyä"]]}
];

/* ══════════ helpers ══════════ */
const $=s=>document.querySelector(s);
const fmt=d=>d.toLocaleDateString(lang==="fi"?"fi-FI":"en-GB",{day:"numeric",month:"numeric",year:"numeric"});
function addMonths(date,m){const d=new Date(date);const day=d.getDate();d.setMonth(d.getMonth()+m);if(d.getDate()<day)d.setDate(0);return d}
function ageStr(dob){const now=new Date();let m=(now.getFullYear()-dob.getFullYear())*12+(now.getMonth()-dob.getMonth());if(now.getDate()<dob.getDate())m--;const y=Math.floor(m/12);const yl=lang==="fi"?"v":"y",ml=uu("kvAgeUnit");return (y?y+" "+yl+" ":"")+(m%12)+" "+ml}
function statusFor(dob,minAge){
  if(!dob)return {cls:"na",txt:uu("statusAge")+" "+minAge+" "+uu("kvAgeUnit")};
  const ready=addMonths(dob,minAge),now=new Date();
  return now>=ready?{cls:"ok",txt:uu("statusNow")}:{cls:"wait",txt:uu("statusFrom")+" "+fmt(ready)};
}
function scaleHTML(sc){if(!sc)return"";return `<details class="scale"><summary>${tr(sc.name)}</summary><div class="sc"><table>${sc.rows.map(r=>`<tr><td>${r[0]}</td><td>${tr(r[1])}</td></tr>`).join("")}</table></div></details>`}

function filmHTML(st,minAge,limit,dob,extraNote,spineTypes){
  const s=statusFor(dob,minAge);
  const kvs=[
    `<div class="kv"><div class="k">${uu("kvAge")}</div><div class="v mono">${minAge} ${uu("kvAgeUnit")}${dob?" · "+uu("fills")+" "+fmt(addMonths(dob,minAge)):""}</div></div>`,
    limit?`<div class="kv"><div class="k">${uu("kvLimit")}</div><div class="v mono">${limit}</div></div>`:"",
    st.redo?`<div class="kv"><div class="k">${uu("kvValid")}</div><div class="v" style="font-size:.86rem">${tr(st.redo)}</div></div>`:""
  ].join("");
  let scales=spineTypes?SPINE_SCALES.filter(x=>spineTypes.some(t=>x.name.startsWith(t))).map(scaleHTML).join(""):scaleHTML(st.scale);
  const marks=st.marks?`<h4 class="marks">${uu("marksH")}</h4><ul class="marks">${st.marks.map(m=>`<li>${tr(m)}</li>`).join("")}</ul>`:"";
  const reject=st.reject?`<h4 class="warn">${uu("rejectH")}</h4><ul class="reject">${st.reject.map(r=>`<li>${tr(r)}</li>`).join("")}</ul>`:"";
  return `<article class="film">
    <div class="tab"><span class="code">${tr(st.code)}${spineTypes?" · "+spineTypes.join(" + "):""}</span><h3>${tr(st.title)}</h3><span class="status ${s.cls}">${s.txt}</span></div>
    <div class="body">
      <div class="viewport">${st.svg}<div class="real">${uu("real")}</div><div class="cap">${tr(st.cap)}</div></div>
      <div class="info">
        <div class="grid2">${kvs}</div>
        ${extraNote?`<p style="color:var(--accent);font-size:.9rem;margin-bottom:6px">⚠ ${tr(extraNote)}</p>`:""}
        <h4>${uu("posH")}</h4>
        <ul>${st.pos.map(p=>`<li>${tr(p)}</li>`).join("")}</ul>
        ${marks}
        ${reject}
        ${scales}
      </div>
    </div></article>`;
}

/* ══════════ render ══════════ */
function render(breed,dob){
  const R=$("#result");R.style.display="block";
  const dogAge=dob?` · ${uu("metaAge")} ${ageStr(dob)}`:"";
  const ge=" ≥ ",U2=uu("kvAgeUnit");
  let films=[],chips=[],extras=[];
  if(breed.h){const a=breed.h[0];chips.push(`<span class="chip req">${uu("chipHip")}${ge}${a} ${U2}</span>`);films.push(filmHTML(STUDIES.hip,a,breed.h[1]?`${uu("accepted")} ${breed.h[1]} ${uu("orBetter")}`:null,dob))}
  if(breed.e){const a=breed.e[0];chips.push(`<span class="chip req">${uu("chipElbow")}${ge}${a} ${U2}</span>`);films.push(filmHTML(STUDIES.elbow,a,breed.e[1]!=null?`${uu("accepted")} ${breed.e[1]} ${uu("orBetter")}`:null,dob))}
  if(breed.s){const types=breed.s.t;const needSP=types.includes("SP")||types.includes("IDD");const a=breed.s.a||(needSP?24:12);
    chips.push(`<span class="chip req">${uu("chipSpine")} (${types.join("+")})${ge}${a} ${U2}</span>`);
    films.push(filmHTML(STUDIES.spine,a,null,dob,breed.s.o||null,types))}
  if(breed.oc){chips.push(`<span class="chip req">${uu("chipShoulder")}${ge}12 ${U2}</span>`);films.push(filmHTML(STUDIES.oc,12,null,dob))}
  if(breed.k){extras.push(`<li>${uu("patella")}${breed.k!==1?`, ${uu("limitLabel")} ${breed.k}`:""}</li>`)}
  (breed.x||[]).forEach(x=>extras.push(`<li>${tr(x)}</li>`));

  const hasXray=films.length>0;
  let banner="";
  if(breed.other){banner=`<div class="banner info">${uu("bNoProg")}</div>`}
  else if(breed.np===1){banner=`<div class="banner none"><b>${breed.n}</b> — ${uu("bNp")}</div>`}
  else if(!hasXray){banner=`<div class="banner info">${uu("bNoXray")}</div>`}
  if(breed.note)banner+=`<div class="banner info">ℹ ${tr(breed.note)}</div>`;

  R.innerHTML=`
   <div class="rhead">
     <div><h2>${breed.n}</h2><div class="meta">PEVISA 2026${dob?` · ${uu("metaBorn")} ${fmt(dob)}${dogAge}`:""}</div></div>
     <div class="actions"><button class="btn ghost" onclick="window.print()">${uu("print")}</button></div>
   </div>
   <div class="summary">${chips.join("")||`<span class="chip">${uu("chipNone")}</span>`}</div>
   ${banner}
   <div class="films">${films.join("")}</div>
   ${extras.length?`<div class="extras"><h3>${uu("extrasH")}</h3><ul>${extras.join("")}</ul></div>`:""}
   ${hasXray?checklistHTML(breed,dob):""}`;
  R.scrollIntoView({behavior:"smooth",block:"start"});
}

function checklistHTML(breed,dob){
  return `<div class="checklist">
   <h3>${uu("clTitle")}</h3>
   <div class="sub">${uu("clSub")} · ${breed.n.toUpperCase()}</div>
   <ol>${uu("clItems").map(i=>`<li>${i}</li>`).join("")}</ol>
   <div class="limits">${uu("clLimits")}</div>
  </div>`;
}

/* ══════════ autocomplete + wiring ══════════ */
const input=$("#breed"),sug=$("#suggest"),dobEl=$("#dob");let selected=null,activeIdx=-1;
function openSug(list){
  const npl=lang==="fi"?"ei PEVISA-ohjelmaa":"no PEVISA programme";
  sug.innerHTML=list.slice(0,14).map((b,i)=>`<button type="button" data-i="${BREEDS.indexOf(b)}">${b.n}${b.np===1?` <span class="np">${npl}</span>`:""}</button>`).join("");
  sug.classList.toggle("open",list.length>0);activeIdx=-1;
}
input.addEventListener("input",()=>{selected=null;const q=input.value.trim().toLowerCase();
  if(q.length<1){sug.classList.remove("open");return}
  openSug(BREEDS.filter(b=>b.n.toLowerCase().includes(q)));
});
input.addEventListener("keydown",e=>{
  const btns=[...sug.querySelectorAll("button")];
  if(e.key==="ArrowDown"||e.key==="ArrowUp"){e.preventDefault();if(!btns.length)return;
    activeIdx=(activeIdx+(e.key==="ArrowDown"?1:-1)+btns.length)%btns.length;
    btns.forEach((b,i)=>b.classList.toggle("active",i===activeIdx));btns[activeIdx].scrollIntoView({block:"nearest"})}
  else if(e.key==="Enter"){e.preventDefault();
    if(activeIdx>=0&&btns[activeIdx])pick(+btns[activeIdx].dataset.i);
    else if(btns.length)pick(+btns[0].dataset.i);
    else go()}
  else if(e.key==="Escape")sug.classList.remove("open");
});
sug.addEventListener("mousedown",e=>{const b=e.target.closest("button");if(b)pick(+b.dataset.i)});
document.addEventListener("click",e=>{if(!e.target.closest(".breedbox"))sug.classList.remove("open")});
function pick(i){selected=BREEDS[i];input.value=selected.n;sug.classList.remove("open");go()}
function go(){
  if(!selected){const q=input.value.trim().toLowerCase();
    selected=BREEDS.find(b=>b.n.toLowerCase()===q)||BREEDS.find(b=>b.n.toLowerCase().includes(q))||null;
    if(!selected){input.focus();return}}
  input.value=selected.n;
  const dob=dobEl.value?new Date(dobEl.value+"T12:00:00"):null;
  render(selected,dob);
  const p=new URLSearchParams();p.set("rotu",selected.n);if(dobEl.value)p.set("syntynyt",dobEl.value);
  history.replaceState(null,"","?"+p.toString());
}
$("#go").addEventListener("click",go);
dobEl.addEventListener("change",()=>{if(selected)go()});

/* ══════════ language ══════════ */
function applyChrome(){
  document.documentElement.lang=lang;
  $("#t-kicker").textContent=uu("kicker");
  $("#t-h1").innerHTML=uu("h1");
  $("#t-lead").innerHTML=uu("lead");
  $("#t-rotu").textContent=uu("rotu");
  $("#t-dob").textContent=uu("dob");
  $("#t-dobopt").textContent=uu("dobOpt");
  $("#go").textContent=uu("go");
  $("#breed").placeholder=uu("placeholder");
  $("#t-hint").textContent=uu("hint");
  $("#t-src").textContent=uu("srcLabel")+" ";
  $("#t-disc").textContent=uu("discl");
  document.querySelectorAll(".langtoggle button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
}
function setLang(l){
  if(l===lang)return;
  lang=l;localStorage.setItem("kk_lang",l);
  applyChrome();
  if(selected){const dob=dobEl.value?new Date(dobEl.value+"T12:00:00"):null;render(selected,dob);}
}
document.querySelectorAll(".langtoggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));
applyChrome();

/* deep-link */
(function(){const p=new URLSearchParams(location.search);const r=p.get("rotu");
  if(r){const b=BREEDS.find(x=>x.n.toLowerCase()===r.toLowerCase());
    if(b){selected=b;input.value=b.n;if(p.get("syntynyt"))dobEl.value=p.get("syntynyt");go()}}})();
</script>
