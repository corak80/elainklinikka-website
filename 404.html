<!DOCTYPE html>
<html lang="fi">
<head>

  <title>Sivua ei löytynyt — Eläinklinikka Saari</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/favicon.ico">
  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--color-primary, #2a7d4f);
    }
    .error-page p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--color-text, #333);
    }
    .error-page .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: var(--color-primary, #2a7d4f);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    .error-page .back-link:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <div class="logo-icon"><img src="/images/logo.png" alt="Eläinklinikka Saari" width="240" height="240"></div>
      </a>
    </div>
  </header>

  <main class="error-page">
    <div>
      <h1>Sivua ei löytynyt</h1>
      <p>Etsimääsi sivua ei valitettavasti löytynyt.</p>
      <p lang="sv">Sidan kunde tyvärr inte hittas.</p>
      <p lang="en">The page you are looking for could not be found.</p>
      <a href="/" class="back-link">Etusivulle / Till startsidan / Home</a>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>&copy; 2026 Eläinklinikka Saari Oy &middot; Y-tunnus: 0708667-9</span>
      </div>
    </div>
